<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Investment Confirmation - Bobl</title>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Comfortaa', sans-serif;
            background: linear-gradient(135deg, #87CEEB 0%, #B0E0E6 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            color: white;
        }
        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 3rem;
            text-align: center;
            max-width: 500px;
            border: 2px solid rgba(255, 255, 255, 0.2);
        }
        .status-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }
        .success { color: #4CAF50; }
        .error { color: #f44336; }
        .loading { color: #FFC107; }
        h1 { margin-bottom: 1rem; }
        p { margin-bottom: 2rem; line-height: 1.6; }
        .btn {
            background: white;
            color: #87CEEB;
            padding: 15px 30px;
            border: none;
            border-radius: 50px;
            font-family: 'Comfortaa', sans-serif;
            font-weight: 600;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s ease;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="status-icon loading" id="statusIcon">⏳</div>
        <h1 id="statusTitle">Verifying Payment...</h1>
        <p id="statusMessage">Please wait while we confirm your investment.</p>
        <a href="index.html" class="btn" id="returnBtn" style="display: none;">Return to Pitch Deck</a>
    </div>

    <script>
        async function verifyPayment() {
            const urlParams = new URLSearchParams(window.location.search);
            const reference = urlParams.get('reference');
            
            if (!reference) {
                showError('Invalid payment reference');
                return;
            }
            
            try {
                const response = await fetch(`http://localhost:3003/v1.0/investment/verify/${reference}`);
                const data = await response.json();
                
                if (data.success && data.data.status === 'success') {
                    showSuccess(data.data.investor);
                } else {
                    showError('Payment verification failed');
                }
            } catch (error) {
                console.error('Verification error:', error);
                showError('Failed to verify payment');
            }
        }
        
        function showSuccess(investor) {
            document.getElementById('statusIcon').innerHTML = '✅';
            document.getElementById('statusIcon').className = 'status-icon success';
            document.getElementById('statusTitle').textContent = 'Investment Successful!';
            document.getElementById('statusMessage').innerHTML = `
                Thank you for investing in Bobl!<br>
                Investment Amount: ₦${investor.amount.toLocaleString()}<br>
                Your Equity: ${investor.equityPercentage}%<br>
                You will receive a confirmation email shortly.
            `;
            document.getElementById('returnBtn').style.display = 'inline-block';
        }
        
        function showError(message) {
            document.getElementById('statusIcon').innerHTML = '❌';
            document.getElementById('statusIcon').className = 'status-icon error';
            document.getElementById('statusTitle').textContent = 'Payment Failed';
            document.getElementById('statusMessage').textContent = message;
            document.getElementById('returnBtn').style.display = 'inline-block';
        }
        
        // Start verification on page load
        verifyPayment();
    </script>
</body>
</html>
